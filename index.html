<body>

<script>
// APIキーをlocalStorageから復元
const state = {

  madori:'', area:'', age:'',
  stress:{narrow:0,storage:0,noise:0,childSpace:0},
  contract:{renewal:'',penalty:'',rent:''},
  costs:{initial:'',moving:'',furniture:''},
  floorplanBase64:null, floorplanMediaType:null
};

// ── 楽天API設定 ───────────────────────────────────────────────────
// applicationId はサーバーサイド（Netlify Functions）で管理するため、ここには置かない
const RAKUTEN_AFF_ID   = '52436724.dfd51e22.52436725.31def4bc';
const RAKUTEN_API_BASE = '/.netlify/functions/rakuten';

// 楽天URL生成はbuildProductCardHtml内でaff済みURLを直接使用

function getMinArea(adults, children) {
  let u = parseInt(adults)||0;
  for (const a of children) { const ag=parseInt(a)||0; u += ag<6?0.25:ag<10?0.75:1; }
  return Math.max(25, Math.ceil(u*10));
}
function getRecommendedArea(adults, children) {
  let u = parseInt(adults)||0;
  for (const a of children) { const ag=parseInt(a)||0; u += ag<6?0.25:ag<10?0.75:1; }
  return Math.max(40, Math.ceil(u*20+15));
}
function hasInfant()     { return state.children.some(a=>parseInt(a)<=2); }
function hasYoungChild() { return state.children.some(a=>parseInt(a)<=5); }

function render() {
  const root = document.getElementById('appRoot');
  const totalSteps = 5;
  const pct = state.step>totalSteps?100:Math.round((state.step/totalSteps)*100);
  document.getElementById('stepLabel').textContent = state.step>totalSteps?'RESULT':`STEP ${state.step} / ${totalSteps}`;
  document.getElementById('stepPct').textContent = pct+'%';
  document.getElementById('progressFill').style.width = pct+'%';
  if      (state.step===1) renderStep1(root);
  else if (state.step===2) renderStep2(root);
  else if (state.step===3) renderStep3(root);
  else if (state.step===4) renderStep4(root);
  else if (state.step===5) renderStep5(root);
  else                     renderResult(root);
}

function renderChildren() {
  const list = document.getElementById('childrenList'); if(!list) return;
  list.innerHTML = state.children.map((age,i)=>`
    <div class="child-row">
      <input type="number" min="0" max="18" placeholder="年齢（歳）" value="${age}" data-idx="${i}" class="child-age-input">
      <span class="unit">歳</span>
      <button class="remove-btn" data-idx="${i}">×</button>
    </div>`).join('');
  list.querySelectorAll('.child-age-input').forEach(el=>el.addEventListener('input',e=>{state.children[parseInt(e.target.dataset.idx)]=e.target.value;}));
  list.querySelectorAll('.remove-btn').forEach(el=>el.addEventListener('click',e=>{state.children.splice(parseInt(e.target.dataset.idx),1);renderChildren();}));
}

    <p class="step-desc">各項目の不満度をスライドで入力してください。引っ越し判断スコアに直結します。</p>
    ${items.map(item=>`
    <div class="slider-field">
      <div class="slider-header"><span class="slider-name">${item.label}</span><span class="slider-val" id="val_${item.key}">${labels[state.stress[item.key]]}</span></div>

      <button class="btn-back" id="back3">← 戻る</button>

// ─── RESULT ─────────────────────────────────────────────────────
function renderResult(root) {
  const adults=parseInt(state.adults)||2;
  const minArea=getMinArea(adults,state.children);
  const recArea=getRecommendedArea(adults,state.children);
  const area=parseFloat(state.area)||0;
  const buildingAge=parseInt(state.age)||0;
  const rent=parseFloat(state.contract.rent)||0;
  const initial=parseFloat(state.costs.initial)||0;
  const moving=parseFloat(state.costs.moving)||0;
  const furniture=parseFloat(state.costs.furniture)||0;
  let penaltyAmt=0;
  if(state.contract.penalty==='家賃1ヶ月') penaltyAmt=rent;
  else if(state.contract.penalty==='家賃2ヶ月') penaltyAmt=rent*2;
  else if(state.contract.penalty==='家賃3ヶ月以上') penaltyAmt=rent*3;
  const totalCost=initial+moving+furniture+penaltyAmt;
  const costMonths=rent>0?(totalCost/rent).toFixed(1):'?';
  const stressTotal=Object.values(state.stress).reduce((a,b)=>a+b,0);
  const stressPct=Math.round(stressTotal/16*100);
  let areaStatus='適正', areaPct=15;
  if(area>0&&area<minArea){areaStatus='最低基準以下';areaPct=90;}
  else if(area>0&&area<recArea){areaStatus='やや不足';areaPct=55;}
  const costOK=parseFloat(costMonths)<=4;
  const costPct=costOK?20:Math.min(90,parseFloat(costMonths||0)*10);
  const moveScore=(stressPct*0.35)+(areaPct*0.35)+(costOK?10:60)*0.2+((state.futureChildren||state.pregnant)?70:10)*0.1;
  let verdict,verdictClass,emoji,verdictSub;
  if(moveScore>=65){verdict='引っ越しを推奨します';verdictClass='move';emoji='🚚';const urgency=(state.futureChildren||state.pregnant)?'3〜6ヶ月以内':'半年〜1年以内';verdictSub=`生活ストレス・居住面積・将来計画を総合判断した結果、<strong>${urgency}</strong>の引っ越しが最適です。`;}
  else if(moveScore<=35){verdict='住み続けるのが賢明です';verdictClass='stay';emoji='🏡';verdictSub='コスト・契約・居住状況を考慮すると、引っ越しコストに見合うメリットが少ない状態です。まずは現空間の最適化を検討しましょう。';}
  else{verdict='どちらでもOK（条件次第）';verdictClass='either';emoji='⚖️';verdictSub='明確な優劣はありません。下の判断フロー図を参考に、ご自身の優先度で決めてください。';}
  const reasons=[];
  if(stressPct>=60) reasons.push({icon:'😓',title:'生活ストレスが高い',text:`ストレスレベル ${stressPct}%。特に「${getTopStress()}」が顕著です。`});
  if(area>0&&area<minArea) reasons.push({icon:'📐',title:'面積が国交省最低基準を下回る',text:`現在${area}㎡ に対し最低${minArea}㎡。法的・健康的リスクがあります。`});
  else if(area>0&&area<recArea) reasons.push({icon:'📏',title:'推奨面積をやや下回る',text:`現在${area}㎡。推奨${recArea}㎡に対してやや不足しています。`});
  if(state.futureChildren||state.pregnant) reasons.push({icon:'👶',title:'家族増加が見込まれる',text:'現居住面積が近い将来確実に不足します。早めの検討が得策です。'});
  if(buildingAge>40) reasons.push({icon:'🏚️',title:'築年数が40年超',text:'旧耐震基準（1981年以前）の可能性があります。耐震性の確認を推奨します。'});
  if(!costOK&&parseFloat(costMonths)>0) reasons.push({icon:'💸',title:`引っ越しコストが家賃${costMonths}ヶ月分`,text:`総費用 ${Math.round(totalCost/10000)}万円 はかなりの負担です。タイミングの最適化が重要です。`});
  const layoutTips=getSafeLayoutTips();
  const decisionSvg=buildDecisionSvg(verdictClass,stressPct,areaPct,costOK,state.futureChildren||state.pregnant);

  root.innerHTML = `
  <div class="card">
    <div class="result-verdict">
      <div class="verdict-emoji">${emoji}</div>
      <div class="verdict-type">DIAGNOSIS RESULT</div>
      <div class="verdict-title ${verdictClass}">${verdict}</div>
      <p class="verdict-sub">${verdictSub}</p>
    </div>

    <div class="score-bar-section">
      <div class="section-title">📊 スコア詳細</div>
      <div class="score-item">
        <div class="score-item-header"><span class="score-item-name">生活ストレス</span><span class="score-item-val">${stressPct}%</span></div>
        <div class="score-track"><div class="score-fill red" data-w="${stressPct}" style="width:0%"></div></div>
      </div>
      <div class="score-item">
        <div class="score-item-header"><span class="score-item-name">面積の逼迫度</span><span class="score-item-val">${areaStatus}</span></div>
        <div class="score-track"><div class="score-fill red" data-w="${areaPct}" style="width:0%"></div></div>
      </div>
      <div class="score-item">
        <div class="score-item-header"><span class="score-item-name">引っ越しコスト負荷</span><span class="score-item-val">家賃${costMonths}ヶ月分</span></div>
        <div class="score-track"><div class="score-fill yellow" data-w="${Math.min(costPct,100)}" style="width:0%"></div></div>
      </div>
    </div>

    ${reasons.length>0?`<div class="reasons-section"><div class="section-title">📋 判断の根拠</div>${reasons.map(r=>`<div class="reason-item"><div class="reason-icon">${r.icon}</div><div class="reason-text"><strong>${r.title}</strong>${r.text}</div></div>`).join('')}</div>`:''}

    <div class="diagram-section">
      <div class="section-title">🗺️ 意思決定フロー図</div>
      <div class="diagram-wrap">${decisionSvg}</div>
    </div>

    <div class="cost-section">
      <h3>💰 引っ越しコスト内訳</h3>
      <div class="cost-row"><span>新居 初期費用</span><span>${initial>0?Math.round(initial/10000)+'万円':'未入力'}</span></div>
      <div class="cost-row"><span>引っ越し費用</span><span>${moving>0?Math.round(moving/10000)+'万円':'未入力'}</span></div>
      <div class="cost-row"><span>家具・家電</span><span>${furniture>0?Math.round(furniture/10000)+'万円':'未入力'}</span></div>
      ${penaltyAmt>0?`<div class="cost-row"><span>違約金</span><span>${Math.round(penaltyAmt/10000)}万円</span></div>`:''}
      <div class="cost-row"><span>合計</span><span>${totalCost>0?Math.round(totalCost/10000)+'万円':'—'}</span></div>
    </div>

    <div class="layout-section">
      <div class="section-title">🛋️ 空間活用アドバイス <span style="font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--accent2)">— お子さまの年齢を考慮済み</span></div>
      <div id="rakutenIdBar"></div>
      <div class="layout-grid">${layoutTips.map(t=>`
        <div class="layout-tip">
          <div class="tip-icon">${t.icon}</div>
          <div class="tip-title">${t.title} ${t.safe?'<span class="safe-badge">✓ 安全</span>':t.warn?'<span class="warn-badge">⚠ NG</span>':''}</div>
          <div style="font-size:12px;line-height:1.7">${t.text}</div>
          ${t.rakuten?`<a class="rakuten-btn" href="https://search.rakuten.co.jp/search/mall/${encodeURIComponent(t.rakuten)}/" target="_blank" rel="noopener"><span class="r-icon">🛒</span>楽天で探す</a>`:''}
        </div>`).join('')}
      </div>
    </div>

    <div class="floorplan-section">
      <div class="section-title">🛒 あなたの診断結果に合わせた商品</div>
      <div id="productResultArea"></div>
    </div>

    <button class="restart-btn" id="restartBtn">↺ もう一度診断する</button>
  </div>`;

  setTimeout(()=>{root.querySelectorAll('.score-fill[data-w]').forEach(el=>setTimeout(()=>{el.style.width=el.dataset.w+'%';},80));},100);
  document.getElementById('restartBtn').addEventListener('click',()=>{Object.assign(state,{step:1,adults:2,children:[],futureChildren:false,pregnant:false,madori:'',area:'',age:'',stress:{narrow:0,storage:0,noise:0,childSpace:0},contract:{renewal:'',penalty:'',rent:''},costs:{initial:'',moving:'',furniture:''},floorplanBase64:null,floorplanMediaType:null});render();});
  loadDiagnosisProducts();
}

// ─── SVG フロー図 ────────────────────────────────────────────────
function buildDecisionSvg(verdictClass, stressPct, areaPct, costOK, futureKids) {
  const accent='#c84b2f', green='#2d6a4f', gold='#e8a020', gray='#b0a090';
  const resultColor = verdictClass==='move'?accent:verdictClass==='stay'?green:gold;
  const resultLabel = verdictClass==='move'?'🚚 引っ越し推奨':verdictClass==='stay'?'🏡 住み続けを推奨':'⚖️ どちらでもOK';

  const factors = [
    { label:'生活ストレス', sub: stressPct>=60?`高い (${stressPct}%)`:`低い (${stressPct}%)`, hot: stressPct>=60 },
    { label:'居住面積',     sub: areaPct>=55?'不足':'十分',  hot: areaPct>=55 },
    { label:'引越コスト',   sub: !costOK?'高コスト':'許容内', hot: !costOK },
    { label:'家族増加',     sub: futureKids?'予定あり':'なし',hot: futureKids },
  ];

  const FW=120, FH=54, GAP=14;
  const totalW=factors.length*(FW+GAP)-GAP;
  const SVG_W=Math.max(totalW+40, 500);
  const startX=(SVG_W-totalW)/2;

  let factorBoxes='', connLines='';
  const centerX=SVG_W/2, midY=120;

  factors.forEach((f,i)=>{
    const x=startX+i*(FW+GAP);
    const bx=x, by=10, bw=FW, bh=FH;
    const fc=f.hot?accent:gray;
    const bg=f.hot?'#fdf0ed':'#f5f5f2';
    factorBoxes+=`
      <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="5" fill="${bg}" stroke="${fc}" stroke-width="1.5"/>
      <text x="${bx+bw/2}" y="${by+19}" text-anchor="middle" font-size="11" font-weight="700" fill="${fc}">${f.label}</text>
      <text x="${bx+bw/2}" y="${by+37}" text-anchor="middle" font-size="11" fill="${fc}">${f.sub}</text>`;
    const fx=bx+bw/2, fy=by+bh;
    const fc2=f.hot?accent:gray;
    connLines+=`<path d="M${fx},${fy} C${fx},${fy+20} ${centerX},${midY-20} ${centerX},${midY}" stroke="${fc2}" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>`;
  });

  // 結果ノード
  const rw=200, rh=48, rx=(SVG_W-rw)/2, ry=midY;
  // 下段アクション
  const actions=[];
  if(verdictClass==='stay'||verdictClass==='either') actions.push({label:'🛋️ 空間を最適化',sub:'家具配置・収納改善',c:green,bg:'#f0f7f3'});
  if(verdictClass==='move'||verdictClass==='either') actions.push({label:'🚚 引っ越しを検討',sub:'更新タイミングを計算',c:accent,bg:'#fdf0ed'});
  actions.push({label:'📅 タイミング最適化',sub:'閑散期・更新直前を狙う',c:gold,bg:'#fff8f0'});

  const AWall=actions.length*(140+12)-12;
  const aStartX=(SVG_W-AWall)/2;
  let actionBoxes='', actionLines='';
  actions.forEach((a,i)=>{
    const ax=aStartX+i*(140+12), ay=midY+rh+40, aw=140, ah=50;
    actionBoxes+=`
      <rect x="${ax}" y="${ay}" width="${aw}" height="${ah}" rx="4" fill="${a.bg}" stroke="${a.c}" stroke-width="1.5"/>
      <text x="${ax+aw/2}" y="${ay+19}" text-anchor="middle" font-size="11" font-weight="700" fill="${a.c}">${a.label}</text>
      <text x="${ax+aw/2}" y="${ay+36}" text-anchor="middle" font-size="10" fill="${a.c}">${a.sub}</text>`;
    const acx=ax+aw/2, acy=ay;
    actionLines+=`<path d="M${centerX},${ry+rh} C${centerX},${ry+rh+16} ${acx},${acy-16} ${acx},${acy}" stroke="${a.c}" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>`;
  });

  const SVG_H=midY+rh+40+50+20;
  return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${SVG_W}px;font-family:'Zen Kaku Gothic New',sans-serif">
    ${factorBoxes}
    ${connLines}
    <rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" rx="6" fill="${resultColor}"/>
    <text x="${centerX}" y="${ry+rh/2+5}" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">${resultLabel}</text>
    ${actionLines}
    ${actionBoxes}
  </svg>`;
}

// ── 診断結果から楽天検索キーワードを自動生成 ─────────────────────
function buildSearchGroups() {
  const infant = hasInfant();
  const young  = hasYoungChild();
  const kids   = state.children;
  const madori = state.madori;
  const stress = state.stress;
  const groups = [];

  // ① 子どもの年齢ベース（安全考慮）
  if (infant) {
    groups.push({ label:'🍼 転倒防止・家具固定グッズ', keyword:'家具転倒防止 突っ張り棒 ベビー' });
    groups.push({ label:'🧸 ベビーサークル',            keyword:'ベビーサークル プレイマット 折りたたみ' });
    groups.push({ label:'🛏️ ローベッド・ベビー布団',   keyword:'ローベッド 赤ちゃん マットレス' });
    groups.push({ label:'🔒 コーナーガード',            keyword:'コーナーガード テーブル 赤ちゃん シリコン' });
  } else if (young) {
    groups.push({ label:'🛡️ けが防止グッズ',           keyword:'コーナーガード 転倒防止 子ども 安全' });
    groups.push({ label:'🎒 おもちゃ収納・絵本棚',     keyword:'おもちゃ収納 キッズ 棚 絵本ラック' });
    groups.push({ label:'🪑 キッズチェア・デスク',     keyword:'学習椅子 キッズデスク 子ども用' });
  } else if (kids.length > 0) {
    groups.push({ label:'📚 学習デスク・チェア',        keyword:'学習机 椅子 セット 高さ調整' });
    groups.push({ label:'🛏️ ロフトベッド',             keyword:'ロフトベッド 学習机 子ども 木製' });
    groups.push({ label:'📦 子ども部屋収納',            keyword:'収納ボックス キャスター付き 子ども部屋' });
  }

  // ② 間取りベース
  if (['1R/1K','1DK'].includes(madori)) {
    groups.push({ label:'🪑 折りたたみ家具',            keyword:'折りたたみ テーブル チェア 一人暮らし' });
    groups.push({ label:'📐 壁面収納',                  keyword:'突っ張り棒 ウォールシェルフ 壁面収納' });
  } else if (['1LDK','2DK'].includes(madori)) {
    groups.push({ label:'🗄️ 間仕切りシェルフ',         keyword:'オープンシェルフ 間仕切り リビング 収納' });
    groups.push({ label:'📦 クローゼット収納',          keyword:'クローゼット 収納ユニット 仕切り 引き出し' });
  } else if (['2LDK','3DK'].includes(madori)) {
    groups.push({ label:'🗄️ リビング収納',             keyword:'リビング 収納 シェルフ テレビ台 壁面' });
    groups.push({ label:'🛋️ コンパクトソファ',         keyword:'ソファ コンパクト 2人掛け ファブリック' });
  } else {
    groups.push({ label:'🛏️ ベッドフレーム',            keyword:'ベッドフレーム セミダブル 収納付き 木製' });
    groups.push({ label:'📦 大容量収納家具',            keyword:'収納家具 ボックス おしゃれ 木製 大容量' });
  }

  // ③ ストレスベース
  if (stress.storage >= 2) {
    groups.push({ label:'📦 収納ボックス',              keyword:'収納ボックス 積み重ね ふた付き おしゃれ' });
    groups.push({ label:'🧹 隙間収納',                 keyword:'突っ張り棒 デッドスペース 収納 隙間' });
  }
  if (stress.narrow >= 2) {
    groups.push({ label:'🪞 省スペース家具',            keyword:'省スペース 多機能 家具 コンパクト' });
  }
  if (stress.noise >= 2) {
    groups.push({ label:'🔇 防音カーテン・シート',      keyword:'遮音カーテン 防音シート 賃貸 吸音' });
  }
  if (stress.childSpace >= 2) {
    groups.push({ label:'🎨 プレイマット',              keyword:'プレイマット ジョイントマット 子ども 厚手' });
  }
  if (state.futureChildren || state.pregnant) {
    groups.push({ label:'🍼 出産準備グッズ',            keyword:'ベビーベッド 添い寝 折りたたみ 安全' });
  }

  // 重複除去・最大8件
  const seen = new Set();
  return groups.filter(g => !seen.has(g.label) && seen.add(g.label)).slice(0, 8);
}

// ── 楽天商品検索（Netlify Functions 経由 / CORS対応）────────────
async function rakutenFetch(keyword) {
  const params = new URLSearchParams({
    keyword,
    hits: '3',
    page: '1',
    sort: 'standard',
  });
  const res = await fetch(`${RAKUTEN_API_BASE}?${params}`);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.items || [];
}
// ── 楽天商品カードのHTML生成 ─────────────────────────────────────
function buildProductCardHtml(item) {
  const price   = parseInt(item.itemPrice || 0).toLocaleString();
  const name    = (item.itemName  || '').replace(/</g, '&lt;').slice(0, 55);
  const shop    = (item.shopName  || '').replace(/</g, '&lt;');
  // Netlify Functions 軽量レスポンスでは imageUrl が文字列で直接返る
  const imgUrl  = item.imageUrl || '';
  const rawUrl  = item.itemUrl || '#';
  // アフィリエイトリンク形式に変換
  const buyUrl  = RAKUTEN_AFF_ID
    ? 'https://hb.afl.rakuten.co.jp/hgc/' + RAKUTEN_AFF_ID + '/?pc=' + encodeURIComponent(rawUrl) + '&m=' + encodeURIComponent(rawUrl)
    : rawUrl;

  return '<div class="product-card">'
    + (imgUrl ? '<img class="product-img" src="' + imgUrl + '" alt="' + name + '" loading="lazy">' : '<div class="product-img-placeholder">📦</div>')
    + '<div class="product-body">'
    + '<div class="product-name">' + name + '</div>'
    + '<div class="product-price">¥' + price + '</div>'
    + '<div class="product-shop">' + shop + '</div>'
    + '</div>'
    + '<a class="product-buy-btn" href="' + buyUrl + '" target="_blank" rel="noopener">楽天で購入 →</a>'
    + '</div>';
}

// ── メイン：診断完了後に商品を読み込む ──────────────────────────
async function loadDiagnosisProducts() {
  const container = document.getElementById('productResultArea');
  if (!container) return;

  const groups = buildSearchGroups();
  if (groups.length === 0) return;

  container.innerHTML = `<div class="ai-loading"><div class="ai-spinner"></div>楽天で商品を検索中...<br><small style="color:#aaa;display:block;margin-top:4px">${groups.length}カテゴリを検索しています</small></div>`;

  // Netlify Functions 経由で直列取得（並列だとレート制限に当たりやすいため）
  const results = [];
  for (const g of groups) {
    try {
      const items = await rakutenFetch(g.keyword);
      if (items.length > 0) results.push({ label: g.label, items });
    } catch (e) {
      console.warn('検索失敗:', g.keyword, e.message);
    }
  }

  if (results.length === 0) {
    container.innerHTML = `<div class="safety-alert">⚠️ 商品の取得に失敗しました。しばらく経ってから再度お試しください。</div>`;
    return;
  }

  let html = '<div class="product-section">';
  for (const g of results) {
    html += `<div class="product-group">
      <div class="product-group-title"><span>🛒</span>${g.label}</div>
      <div class="product-grid">`;
    for (const item of g.items.slice(0, 3)) {
      html += buildProductCardHtml(item);
    }
    html += `</div></div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function getTopStress() {
  const map={narrow:'部屋の狭さ',storage:'収納不足',noise:'騒音',childSpace:'子どもスペース'};
  let max=-1,key='narrow';
  for(const k of Object.keys(state.stress)){if(state.stress[k]>max){max=state.stress[k];key=k;}}
  return map[key];
}
